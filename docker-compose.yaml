services:
  # 1. Il database (MariaDB)
  mariadb:
    image: mariadb:10.11
    container_name: database
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mio_database
      MYSQL_USER: user
      MYSQL_PASSWORD: sapienza
    ports:
      - "3306:3306"
    volumes:
      # Salva i dati in questa cartella fisica del progetto
      - ./mariadb_data:/var/lib/mysql

  # 2. IL BACKEND 
  backend:
    build: ./backend
    container_name: backend
    ports:
      - "8003:8003"
    volumes:
      - ./domains.json:/app/domains.json
      - ./gs_data:/app/gs_data
    depends_on:
      - mariadb

  # 3. IL FRONTEND
  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8004:8000"
    environment:
      - BACKEND_URL=http://backend:8003 
    depends_on:
      - backend

  # 4. L'LLM JUDGE (Ollama)
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      # MODIFICATO: Salvare il modello in una cartella locale del progetto
      - ./ollama_data:/root/.ollama
    entrypoint: /bin/sh -c "ollama serve & sleep 5 && ollama pull llama3.2:3b && wait"
